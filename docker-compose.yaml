services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vending_app
    volumes:
      - ./:/app
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: vending_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: vending_mysql
    environment:
      MYSQL_DATABASE: vending_machine
      MYSQL_USER: vending
      MYSQL_PASSWORD: vending
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: