name: vending_machine

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: vending_machine_app
    container_name: vending_machine_app
    volumes:
      - ./:/app
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    image: vending_machine_nginx
    container_name: vending_machine_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app

  mysql:
    build:
      context: .
      dockerfile: docker/mysql/Dockerfile
    image: vending_machine_mysql
    container_name: vending_machine_mysql

    environment:
      MYSQL_DATABASE: vending_machine
      MYSQL_USER: vending
      MYSQL_PASSWORD: vending
      MYSQL_ROOT_PASSWORD: root

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
